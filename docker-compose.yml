# Requires: copy .env.example to .env and set Gmail credentials (see README).
# Stack: Ollama (LLM) → gateway (logs every /api/chat call to SQLite, dashboard at :4000) → ADAM (agent).

name: adam

services:
  ollama:
    image: ollama/ollama:latest
    # Pass all NVIDIA GPUs through. Requires nvidia-container-toolkit on the
    # host (set up at install time on adam-pc). Without this, Ollama runs on
    # CPU only — symptom: NVIDIA GPU 0%, CPU pegged.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - GIN_MODE=release
      # Keep the model resident so we don't re-load between calls.
      - OLLAMA_KEEP_ALIVE=-1
      # ADAM uses a single model — only one loaded at a time.
      - OLLAMA_MAX_LOADED_MODELS=1
      # Serve up to 4 concurrent inferences from one model.
      - OLLAMA_NUM_PARALLEL=4
      # Faster attention kernel on Ampere+ GPUs.
      - OLLAMA_FLASH_ATTENTION=1
    # Ollama uses Gin's default logger middleware — there is NO env var to
    # silence per-request access logs. Override the entrypoint to pipe
    # `ollama serve` through grep, dropping only the noise lines (200 OK on
    # the healthcheck and Docker probe). Real errors and non-2xx responses
    # still come through. `--line-buffered` flushes per line so logs stay live.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        ollama serve 2>&1 |
        grep --line-buffered -E -v
        '\[GIN\][^|]*\|[[:space:]]*2[0-9][0-9][[:space:]]*\|[^|]*\|[^|]*\|[[:space:]]*(HEAD[[:space:]]+"/"|GET[[:space:]]+"/api/tags")'
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      # 30s reduces the GET /api/tags log spam from 12/min to 2/min while still
      # giving Docker enough signal to fail fast (retries=6 → ~3min worst case).
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 60s

  gateway:
    build:
      context: ./gateway
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    # GPU access for nvidia-smi (utility cap only — no compute reservation,
    # so Ollama keeps the full device for inference).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [utility]
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_PATH=/app/data/calls.db
      - PORT=4000
      - HOST_PROC=/host/proc
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    ports:
      - "4000:4000"                          # Dashboard at http://localhost:4000
    volumes:
      - gateway_data:/app/data
      - /proc:/host/proc:ro                  # Host /proc for CPU/memory metrics
      - ./.env:/app/host/.env
      - ./prompts:/app/host/prompts
      - ./memory:/app/host/memory
      - ./knowledge:/app/host/knowledge
      - ./checkpoints:/app/host/checkpoints
      - ./priv/defaults:/app/host/priv/defaults:ro

  adam:
    build: .
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://gateway:4000
    volumes:
      - ./lib:/app/lib:ro
      - ./prompts:/app/prompts
      - ./tools:/app/tools
      - ./strategies:/app/strategies
      - ./memory:/app/memory
      - ./knowledge:/app/knowledge
      - sandbox:/app/sandbox
      - ./checkpoints:/app/checkpoints

volumes:
  ollama_data:
  sandbox:
  gateway_data:
