# Requires: copy .env.example to .env and set Gmail credentials (see README).
# Stack: Ollama (LLM), ADAM (agent), Observer (dashboard http://localhost:4000).

name: adam

services:
  ollama:
    image: ollama/ollama:latest
    environment:
      - GIN_MODE=release
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 60s

  adam:
    build: .
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./lib:/app/lib:ro
      - ./prompts:/app/prompts
      - ./tools:/app/tools
      - ./strategies:/app/strategies
      - ./memory:/app/memory
      - ./knowledge:/app/knowledge
      - sandbox:/app/sandbox
      - ./checkpoints:/app/checkpoints
      - observer_events:/app/observer

  observer:
    build:
      context: ./observer
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - observer_events:/app/observer

volumes:
  ollama_data:
  sandbox:
  observer_events:
