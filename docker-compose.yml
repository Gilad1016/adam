# Requires: copy .env.example to .env and set Gmail credentials (see README).
# Stack: Ollama (LLM) → gateway (logs every /api/chat call to SQLite, dashboard at :4000) → ADAM (agent).

name: adam

services:
  ollama:
    image: ollama/ollama:latest
    environment:
      - GIN_MODE=release
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 60s

  gateway:
    build:
      context: ./gateway
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_PATH=/app/data/calls.db
      - PORT=4000
    ports:
      - "4000:4000"                          # Dashboard at http://localhost:4000
    volumes:
      - gateway_data:/app/data

  adam:
    build: .
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://gateway:4000
    volumes:
      - ./lib:/app/lib:ro
      - ./prompts:/app/prompts
      - ./tools:/app/tools
      - ./strategies:/app/strategies
      - ./memory:/app/memory
      - ./knowledge:/app/knowledge
      - sandbox:/app/sandbox
      - ./checkpoints:/app/checkpoints

volumes:
  ollama_data:
  sandbox:
  gateway_data:
