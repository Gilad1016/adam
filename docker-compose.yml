services:
  ollama:
    image: ollama/ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  adam:
    build: .
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - ADAM_OBSERVER_MODE=${ADAM_OBSERVER_MODE:-partial}   # off | partial | full
      - OBSERVER_EVENTS_FILE=/app/observer/events.jsonl
    env_file:
      - .env
    volumes:
      - ./lib:/app/lib:ro
      - ./prompts:/app/prompts
      - ./tools:/app/tools
      - ./strategies:/app/strategies
      - ./memory:/app/memory
      - ./knowledge:/app/knowledge
      - sandbox:/app/sandbox
      - observer_data:/app/observer          # ADAM writes events here

  observer:
    build:
      context: ./observer
    depends_on:
      - adam
    environment:
      - ADAM_OBSERVER_MODE=${ADAM_OBSERVER_MODE:-partial}
      - OBSERVER_EVENTS_FILE=/app/observer/events.jsonl
      - OBSERVER_MAX_EVENTS=1000
      - OBSERVER_POLL_MS=500
      - PORT=4000
    ports:
      - "4000:4000"                          # Dashboard at http://localhost:4000
    volumes:
      - observer_data:/app/observer:ro       # observer reads events (read-only)

volumes:
  ollama_data:
  sandbox:
  observer_data:                             # shared: adam writes, observer reads
